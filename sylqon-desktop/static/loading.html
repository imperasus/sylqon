<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src 'unsafe-inline';"
    />
    <title>Sylqon</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #0e0e0f;
        color: #f0f0f1;
        font-family: "Segoe UI", system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 30px;
      }
      /* Flat lime spinner on a hairline track — no glow. */
      .spinner {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        border: 4px solid #2a2a2d;
        border-top-color: #a3e635;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .title {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 3px;
        margin-left: 3px; /* optical centering for letter-spacing */
      }
      .title b { color: #a3e635; font-weight: 700; }
      .sub { color: #8a8b8e; font-size: 14px; letter-spacing: 0.3px; }
      .dots::after {
        display: inline-block;
        width: 1em;
        text-align: left;
        content: "";
        animation: dots 1.4s steps(1, end) infinite;
      }
      @keyframes dots {
        0%   { content: ""; }
        25%  { content: "."; }
        50%  { content: ".."; }
        75%  { content: "..."; }
        100% { content: ""; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="spinner"></div>
      <div class="title">SYL<b>Q</b>ON</div>
      <div class="sub">Starting the local engine<span class="dots"></span></div>
    </div>
  </body>
</html>
