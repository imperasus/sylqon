# electron-builder configuration for Sylqon Desktop (Windows-first).
#
# ICON INTEGRATION (your custom XY icon):
#   directories.buildResources below is "build", and electron-builder
#   AUTO-DETECTS  build/icon.ico  there. That single file becomes:
#     • the packaged Sylqon.exe / app icon
#     • the NSIS installer + uninstaller icon
#   No explicit `win.icon` path is hard-coded on purpose: electron-builder
#   ERRORS if a named icon file is missing, which would break the build before
#   you supply the asset. With auto-detection, the build succeeds either way
#   (default Electron icon until build/icon.ico exists). See build/ICON_README.md.
#
# The BrowserWindow / taskbar icon in DEV is set separately in code
# (src/main/icon.ts → resolveAppIcon()), also reading build/icon.ico.

appId: com.sylqon.desktop
productName: Sylqon

directories:
  output: release
  buildResources: build   # electron-builder auto-detects build/icon.ico here

# Everything the packaged app needs at runtime. build/icon.ico is included so
# the in-app BrowserWindow icon also resolves when packaged (the glob simply
# matches nothing — no error — until you add the file).
files:
  - dist/**/*
  - static/**/*
  - build/icon.ico
  - package.json

# Bundle the standalone PyInstaller backend (built by `npm run build:backend`)
# into resources/backend/. The app spawns resources/backend/sylqon-server.exe,
# so no system Python is required on the user's machine.
extraResources:
  - from: backend/dist/sylqon-server
    to: backend
  # First-run data snapshot (champion universe, meta, builds). Copied into
  # userData on first launch so a fresh install starts WITH data. Built by
  # `npm run make:seed` (part of build:backend). Optional — absent = empty start.
  - from: backend/seed
    to: seed
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64

  # ---------------------------------------------------------------------------
  # CODE-SIGNING SCAFFOLDING (currently DISABLED — builds are unsigned)
  #
  # Unsigned installers still build and auto-update via latest.yml, BUT Windows
  # SmartScreen will warn users ("Windows protected your PC") on first run until
  # the publisher reputation is established. Signing removes that warning.
  #
  # TWO WAYS TO ENABLE (pick one). Neither requires changing this file if you use
  # the env-var route below — electron-builder auto-detects CSC_LINK.
  #
  #   OPTION A — env vars (recommended, no secrets in repo):
  #     Set these in the shell / CI before `npm run dist`:
  #       CSC_LINK            → path or base64 of your .pfx/.p12 cert
  #       CSC_KEY_PASSWORD    → the certificate's password
  #     electron-builder picks them up automatically. In GitHub Actions, store
  #     them as repository secrets and expose them as env on the publish step.
  #
  #   OPTION B — explicit keys here (uncomment and reference env vars only —
  #     NEVER hardcode a real path or password):
  #     # certificateFile: ${env.CSC_LINK}
  #     # certificatePassword: ${env.CSC_KEY_PASSWORD}
  #
  # TODO (when you obtain a cert): also set a timestamp server so signatures stay
  # valid after the cert expires. Uncomment ONE:
  #   # rfc3161TimeStampServer: http://timestamp.digicert.com
  #   # timeStampServer: http://timestamp.digicert.com   # legacy Authenticode
  #
  # TODO: for an EV certificate on a hardware token, signing is interactive and
  # generally cannot run in CI — sign on a machine with the token instead.
  # ---------------------------------------------------------------------------

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sylqon
  # Installer file name: Sylqon-Setup-1.2.3.exe (no spaces, URL-friendly).
  artifactName: Sylqon-Setup-${version}.${ext}

# AUTO-UPDATE PUBLISH CONFIG
# When a new version tag is pushed, GitHub Actions builds and uploads these files.
# electron-updater checks latest.yml on startup to detect available updates.
# To release a new version:
#   1. Bump version in package.json (e.g. 1.0.0 -> 1.1.0)
#   2. Commit: git commit -am "chore: bump version to 1.1.0"
#   3. Tag:    git tag v1.1.0
#   4. Push:   git push && git push --tags
#   GitHub Actions will handle the rest automatically.
publish:
  provider: github
  owner: imperasus
  repo: sylqon
  releaseType: release       # creates a proper release, not a draft
