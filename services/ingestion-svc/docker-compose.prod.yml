# Production stack for the VPS: Caddy (TLS) + Postgres + Redis + the FastAPI
# service + the Discord bot, all containerized on one internal network. No host
# DB ports are exposed; Caddy terminates HTTPS for sylqon.com and proxies to the
# API. Set CADDY_ACME_EMAIL in .env (Let's Encrypt contact) before first start.
#   docker compose -f docker-compose.prod.yml up -d --build
services:
  caddy:
    image: caddy:2-alpine
    container_name: sylqon-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api


  postgres:
    image: postgres:16-alpine
    container_name: sylqon-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sylqon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sylqon}
      POSTGRES_DB: sylqon
    volumes:
      - sylqon_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sylqon -d sylqon"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sylqon-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: sylqon-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://sylqon:${POSTGRES_PASSWORD:-sylqon}@postgres:5432/sylqon
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8090:8090"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

  bot:
    build: .
    container_name: sylqon-bot
    restart: unless-stopped
    command: ["python", "-m", "app.bot"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://sylqon:${POSTGRES_PASSWORD:-sylqon}@postgres:5432/sylqon
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}

volumes:
  sylqon_pg_data:
  caddy_data:
  caddy_config:
