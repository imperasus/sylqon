<svg width="1440" height="600" viewBox="0 0 1440 600" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="presentation" aria-hidden="true">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1428"/><stop offset="100%" stop-color="#05080f"/>
    </linearGradient>
    <radialGradient id="cGlowA" cx="22%" cy="18%" r="55%">
      <stop offset="0%" stop-color="#2fd6c6" stop-opacity="0.22"/><stop offset="100%" stop-color="#2fd6c6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cGlowB" cx="82%" cy="92%" r="55%">
