<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sylqon counter-draft command view: ally and enemy champion columns flanking a central AI recommendation core, feeding an item and rune loadout.">
  <defs>
    <radialGradient id="hBg" cx="50%" cy="20%" r="90%">
      <stop offset="0%" stop-color="#0e1b35"/>
      <stop offset="55%" stop-color="#0a1326"/>
      <stop offset="100%" stop-color="#060b18"/>
    </radialGradient>
    <radialGradient id="hCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ff0e4" stop-opacity="0.9"/>
      <stop offset="45%" stop-color="#2fd6c6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2fd6c6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hBeamA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4aa8ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4aa8ff" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="hBeamE" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#ff6f8b" stop-opacity="0"/>
      <stop offset="100%" stop-color="#ff6f8b" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="hTeal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ff0e4"/>
      <stop offset="100%" stop-color="#2fd6c6"/>
    </linearGradient>
    <filter id="hSoft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- panel -->
  <rect width="1200" height="800" rx="28" fill="url(#hBg)"/>
  <rect x="1" y="1" width="1198" height="798" rx="27" fill="none" stroke="#1b2740" stroke-width="2"/>

  <!-- faint dot grid -->
  <g fill="#5fd0ff" opacity="0.06">
    <g id="hdotrow">
      <circle cx="120" cy="0" r="2"/><circle cx="220" cy="0" r="2"/><circle cx="320" cy="0" r="2"/><circle cx="420" cy="0" r="2"/><circle cx="520" cy="0" r="2"/><circle cx="680" cy="0" r="2"/><circle cx="780" cy="0" r="2"/><circle cx="880" cy="0" r="2"/><circle cx="980" cy="0" r="2"/><circle cx="1080" cy="0" r="2"/>
    </g>
    <use href="#hdotrow" y="140"/><use href="#hdotrow" y="240"/><use href="#hdotrow" y="340"/><use href="#hdotrow" y="440"/><use href="#hdotrow" y="540"/><use href="#hdotrow" y="640"/>
  </g>

  <!-- top bar -->
  <g font-family="'JetBrains Mono', monospace">
    <circle cx="56" cy="58" r="5" fill="#2fd6c6"/>
    <text x="74" y="63" fill="#cdd6e6" font-size="18" letter-spacing="3">CHAMP&#160;SELECT</text>
    <text x="1144" y="63" fill="#2fd6c6" font-size="18" text-anchor="end" letter-spacing="2">0:24</text>
    <rect x="76" y="78" width="1048" height="1.5" fill="#1b2740"/>
  </g>

  <!-- ally column -->
  <g>
    <text x="56" y="128" fill="#4aa8ff" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3">YOUR&#160;TEAM</text>
    <g>
      <g id="hAlly">
        <rect x="48" y="150" width="220" height="70" rx="12" fill="#0d1830" stroke="#274063" stroke-width="1.5"/>
        <rect x="62" y="164" width="42" height="42" rx="10" fill="#14233f" stroke="#4aa8ff" stroke-width="1.5"/>
      </g>
      <use href="#hAlly" y="86"/>
      <use href="#hAlly" y="172"/>
      <use href="#hAlly" y="258"/>
      <use href="#hAlly" y="344"/>
    </g>
    <!-- role glyphs + bars -->
    <g fill="#4aa8ff" font-family="'JetBrains Mono', monospace" font-size="13">
      <text x="83" y="190" text-anchor="middle">T</text><text x="120" y="180" fill="#8fa3c4">Top</text>
      <text x="83" y="276" text-anchor="middle">J</text><text x="120" y="266" fill="#8fa3c4">Jungle</text>
      <text x="83" y="362" text-anchor="middle">M</text><text x="120" y="352" fill="#8fa3c4">Mid</text>
      <text x="83" y="448" text-anchor="middle">A</text><text x="120" y="438" fill="#8fa3c4">ADC</text>
      <text x="83" y="534" text-anchor="middle">S</text><text x="120" y="524" fill="#8fa3c4">Supp</text>
    </g>
  </g>

  <!-- enemy column -->
  <g>
    <text x="1144" y="128" fill="#ff6f8b" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3" text-anchor="end">ENEMY&#160;TEAM</text>
    <g>
      <g id="hEnemy">
        <rect x="932" y="150" width="220" height="70" rx="12" fill="#170f1c" stroke="#5a2f3e" stroke-width="1.5"/>
        <rect x="1096" y="164" width="42" height="42" rx="10" fill="#241420" stroke="#ff6f8b" stroke-width="1.5"/>
        <path d="M932 185 l-12 -8 v16 z" fill="#ff6f8b" opacity="0.8"/>
      </g>
      <use href="#hEnemy" y="86"/>
      <use href="#hEnemy" y="172"/>
      <use href="#hEnemy" y="258"/>
      <use href="#hEnemy" y="344"/>
    </g>
    <g fill="#ff6f8b" font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="middle">
      <text x="1117" y="190">T</text><text x="1117" y="276">J</text><text x="1117" y="362">M</text><text x="1117" y="448">A</text><text x="1117" y="534">S</text>
    </g>
    <g fill="#8fa3c4" font-family="'JetBrains Mono', monospace" font-size="13" text-anchor="end">
      <text x="1075" y="180">Top</text><text x="1075" y="266">Jungle</text><text x="1075" y="352">Mid</text><text x="1075" y="438">ADC</text><text x="1075" y="524">Supp</text>
    </g>
  </g>

  <!-- beams into core -->
  <g stroke-width="2" fill="none" opacity="0.7">
    <path d="M290 300 C 400 320, 460 360, 520 380" stroke="url(#hBeamA)"/>
    <path d="M290 440 C 400 430, 460 410, 520 400" stroke="url(#hBeamA)"/>
    <path d="M910 300 C 800 320, 740 360, 680 380" stroke="url(#hBeamE)"/>
    <path d="M910 440 C 800 430, 740 410, 680 400" stroke="url(#hBeamE)"/>
  </g>

  <!-- AI core -->
  <g transform="translate(600 390)">
    <circle r="150" fill="url(#hCore)" filter="url(#hSoft)"/>
    <circle r="92" fill="#0a1326" stroke="#2fd6c6" stroke-width="2" stroke-opacity="0.5"/>
    <circle r="92" fill="none" stroke="url(#hTeal)" stroke-width="2.5" stroke-dasharray="40 18" opacity="0.85"/>
    <circle r="68" fill="none" stroke="#5fd0ff" stroke-width="1.2" stroke-opacity="0.5"/>
    <!-- crosshair -->
    <g stroke="#7ff0e4" stroke-width="2" opacity="0.8">
      <line x1="-26" y1="0" x2="-10" y2="0"/><line x1="10" y1="0" x2="26" y2="0"/>
      <line x1="0" y1="-26" x2="0" y2="-10"/><line x1="0" y1="10" x2="0" y2="26"/>
    </g>
    <circle r="6" fill="#7ff0e4"/>
    <text y="-44" text-anchor="middle" fill="#2fd6c6" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="3">SYLQON&#160;AI</text>
    <text y="58" text-anchor="middle" fill="#eaf2ff" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="1">PICK · A+</text>
  </g>

  <!-- loadout strip (bottom) -->
  <g transform="translate(0 640)">
    <line x1="76" y1="0" x2="1124" y2="0" stroke="#1b2740" stroke-width="1.5"/>
    <text x="76" y="34" fill="#2fd6c6" font-family="'JetBrains Mono', monospace" font-size="14" letter-spacing="3">COUNTER&#160;LOADOUT</text>
    <!-- item hexes -->
    <g transform="translate(360 50)">
      <g id="hHex">
        <path d="M0 -30 L26 -15 L26 15 L0 30 L-26 15 L-26 -15 Z" fill="#0d1830" stroke="#2fd6c6" stroke-width="1.6"/>
      </g>
      <use href="#hHex"/>
      <use href="#hHex" x="74"/>
      <use href="#hHex" x="148"/>
      <use href="#hHex" x="222"/>
      <use href="#hHex" x="296"/>
      <use href="#hHex" x="370"/>
      <g fill="#7ff0e4" opacity="0.9">
        <circle cx="0" cy="0" r="7"/><rect x="67" y="-7" width="14" height="14" rx="3"/>
        <path d="M141 -8 l8 8 l-8 8 l-8 -8 z"/><circle cx="222" cy="0" r="7" fill="none" stroke="#7ff0e4" stroke-width="2.5"/>
        <rect x="289" y="-7" width="14" height="14" rx="7"/><path d="M364 -8 l8 16 l-16 0 z"/>
      </g>
    </g>
    <!-- rune circle -->
    <g transform="translate(900 50)">
      <circle r="34" fill="#0d1830" stroke="#5fd0ff" stroke-width="1.6"/>
      <circle r="16" fill="#5fd0ff" opacity="0.85"/>
      <circle cx="64" cy="-6" r="13" fill="#0d1830" stroke="#5fd0ff" stroke-width="1.4"/>
      <circle cx="64" cy="26" r="13" fill="#0d1830" stroke="#5fd0ff" stroke-width="1.4"/>
      <circle cx="104" cy="10" r="11" fill="#0d1830" stroke="#2fd6c6" stroke-width="1.4"/>
      <line x1="34" y1="-4" x2="51" y2="-6" stroke="#5fd0ff" stroke-width="1.4" opacity="0.6"/>
      <line x1="34" y1="6" x2="51" y2="24" stroke="#5fd0ff" stroke-width="1.4" opacity="0.6"/>
    </g>
    <!-- imported badge -->
    <g transform="translate(1124 36)" font-family="'JetBrains Mono', monospace">
      <rect x="-196" y="-22" width="196" height="34" rx="9" fill="#0c2018" stroke="#43e0a8" stroke-width="1.3"/>
      <path d="M-178 -5 l5 6 l11 -12" fill="none" stroke="#43e0a8" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="-150" y="1" fill="#9fe9c8" font-size="13">IMPORTED</text>
    </g>
  </g>
</svg>
