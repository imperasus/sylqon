<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Champion recommendation: a pool of champions scored, with the strongest pick locked under a targeting reticle.">
  <defs>
    <radialGradient id="f1bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0e1b35"/><stop offset="100%" stop-color="#080f1f"/>
    </radialGradient>
    <linearGradient id="f1bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2fd6c6" stop-opacity="0.25"/><stop offset="100%" stop-color="#7ff0e4"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="20" fill="url(#f1bg)"/>
  <rect x="1" y="1" width="598" height="398" rx="19" fill="none" stroke="#1b2740" stroke-width="2"/>
  <text x="36" y="52" fill="#2fd6c6" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="3">YOUR&#160;POOL · MID</text>

  <!-- pool avatars -->
  <g>
    <g id="f1av"><rect width="58" height="58" rx="13" fill="#101d36" stroke="#27406a" stroke-width="1.5"/></g>
    <use href="#f1av" x="36" y="76"/>
    <use href="#f1av" x="118" y="76"/>
    <use href="#f1av" x="200" y="76"/>
    <use href="#f1av" x="36" y="158"/>
    <use href="#f1av" x="200" y="158"/>
  </g>
  <g fill="#5f6f8c" font-family="'JetBrains Mono', monospace" font-size="20" text-anchor="middle">
    <text x="65" y="113">◐</text><text x="147" y="113">◑</text><text x="65" y="195">◓</text><text x="229" y="195">◒</text>
  </g>

  <!-- selected pick (highlighted) -->
  <g transform="translate(200 158)">
    <rect x="-6" y="-6" width="70" height="70" rx="16" fill="#0c2a2a" stroke="#2fd6c6" stroke-width="2"/>
    <rect width="58" height="58" rx="13" fill="#103030" stroke="#7ff0e4" stroke-width="1.5"/>
    <text x="29" y="38" fill="#7ff0e4" font-family="'JetBrains Mono', monospace" font-size="22" text-anchor="middle">★</text>
    <!-- reticle -->
    <g stroke="#7ff0e4" stroke-width="2" fill="none" opacity="0.9">
      <path d="M-16 -10 v-8 h8"/><path d="M58 -10 v-8 h-8"/><path d="M-16 68 v8 h8"/><path d="M58 68 v8 h-8"/>
    </g>
  </g>

  <!-- score panel -->
  <g transform="translate(330 70)">
    <text x="0" y="0" fill="#9fb0cc" font-family="'Clash Display','JetBrains Mono',sans-serif" font-size="15">Match score</text>
    <!-- bars -->
    <g>
      <rect x="0" y="22" width="220" height="14" rx="7" fill="#101d36"/>
      <rect x="0" y="22" width="92" height="14" rx="7" fill="url(#f1bar)"/>
      <rect x="0" y="56" width="220" height="14" rx="7" fill="#101d36"/>
      <rect x="0" y="56" width="140" height="14" rx="7" fill="url(#f1bar)"/>
      <rect x="0" y="90" width="220" height="14" rx="7" fill="#101d36"/>
      <rect x="0" y="90" width="198" height="14" rx="7" fill="url(#f1bar)"/>
    </g>
    <g fill="#6b7b98" font-family="'JetBrains Mono', monospace" font-size="11">
      <text x="0" y="18">synergy</text><text x="0" y="52">counter</text><text x="0" y="86">your win-rate</text>
    </g>
    <!-- verdict -->
    <g transform="translate(0 134)">
      <rect width="220" height="48" rx="12" fill="#0c2a2a" stroke="#2fd6c6" stroke-width="1.4"/>
      <text x="18" y="30" fill="#eaf2ff" font-family="'Clash Display',sans-serif" font-weight="600" font-size="18">Best pick</text>
      <text x="202" y="31" fill="#7ff0e4" font-family="'JetBrains Mono', monospace" font-size="20" text-anchor="end">A+</text>
    </g>
  </g>
</svg>
