<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Counter-itemisation: a fixed item core with situational counter items chosen against the enemy threat profile — anti-heal, armor penetration and crowd-control cleanse.">
  <defs>
    <radialGradient id="f2bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0e1b35"/><stop offset="100%" stop-color="#080f1f"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" rx="20" fill="url(#f2bg)"/>
  <rect x="1" y="1" width="598" height="398" rx="19" fill="none" stroke="#1b2740" stroke-width="2"/>

  <!-- enemy threat tags (top) -->
  <text x="36" y="50" fill="#ff6f8b" font-family="'JetBrains Mono', monospace" font-size="13" letter-spacing="3">ENEMY&#160;THREATS</text>
  <g font-family="'JetBrains Mono', monospace" font-size="12" fill="#ffb3c1">
    <g><rect x="36" y="62" width="96" height="28" rx="14" fill="#1c1018" stroke="#5a2f3e" stroke-width="1.3"/><text x="84" y="81" text-anchor="middle">Healing</text></g>
    <g><rect x="142" y="62" width="78" height="28" rx="14" fill="#1c1018" stroke="#5a2f3e" stroke-width="1.3"/><text x="181" y="81" text-anchor="middle">Tanks</text></g>
    <g><rect x="230" y="62" width="120" height="28" rx="14" fill="#1c1018" stroke="#5a2f3e" stroke-width="1.3"/><text x="290" y="81" text-anchor="middle">Hard CC</text></g>
  </g>

  <!-- core row -->
  <text x="36" y="146" fill="#8fa3c4" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2">FIXED&#160;CORE</text>
  <g transform="translate(36 158)">
    <g id="f2core"><rect width="58" height="58" rx="12" fill="#101d36" stroke="#3a5170" stroke-width="1.5"/></g>
    <use href="#f2core" x="0"/><use href="#f2core" x="72"/><use href="#f2core" x="144"/>
    <g fill="#9fb0cc" opacity="0.85">
      <path d="M20 187 l9 -18 l9 18 z" transform="translate(0 -158)"/>
      <rect x="92" y="20" width="18" height="18" rx="4"/>
      <circle cx="173" cy="29" r="10" fill="none" stroke="#9fb0cc" stroke-width="2.4"/>
    </g>
  </g>

  <!-- arrow -->
  <g transform="translate(300 187)" stroke="#2fd6c6" stroke-width="2" fill="none" opacity="0.8">
    <line x1="0" y1="0" x2="34" y2="0"/><path d="M28 -6 l8 6 l-8 6"/>
  </g>

  <!-- counter items (situational) -->
  <text x="350" y="146" fill="#2fd6c6" font-family="'JetBrains Mono', monospace" font-size="12" letter-spacing="2">COUNTER&#160;PICKS</text>
  <g transform="translate(350 158)">
    <g id="f2hex"><path d="M29 0 L58 16 L58 50 L29 66 L0 50 L0 16 Z" fill="#0c2424" stroke="#2fd6c6" stroke-width="1.7"/></g>
    <use href="#f2hex" x="0"/><use href="#f2hex" x="68"/><use href="#f2hex" x="136"/>
    <!-- icons: anti-heal (droplet w/ slash), pen (lightning), cleanse (shield+spark) -->
    <g stroke="#7ff0e4" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M29 16 c8 10 9 16 9 21 a9 9 0 1 1 -18 0 c0 -5 1 -11 9 -21 z" transform="translate(0 4)"/>
      <line x1="18" y1="50" x2="40" y2="24"/>
      <path d="M99 18 l-8 16 h8 l-4 14 l12 -18 h-8 z" fill="#7ff0e4"/>
      <path d="M165 18 l14 5 v10 c0 9 -7 14 -14 18 c-7 -4 -14 -9 -14 -18 v-10 z"/>
      <path d="M160 33 l4 4 l8 -8"/>
    </g>
  </g>

  <!-- labels under counter items -->
  <g fill="#7d8ba6" font-family="'JetBrains Mono', monospace" font-size="10.5" text-anchor="middle">
    <text x="379" y="248">anti-heal</text><text x="447" y="248">%-pen</text><text x="515" y="248">QSS</text>
  </g>

  <!-- footnote -->
  <g transform="translate(36 300)">
    <rect width="528" height="60" rx="13" fill="#0b1426" stroke="#1b2740" stroke-width="1.4"/>
    <circle cx="30" cy="30" r="11" fill="none" stroke="#2fd6c6" stroke-width="2"/>
    <path d="M25 30 l4 4 l7 -9" fill="none" stroke="#2fd6c6" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="26" fill="#cdd6e6" font-family="'Clash Display',sans-serif" font-size="14" font-weight="600">Same op.gg core, swapped tail</text>
    <text x="54" y="46" fill="#7d8ba6" font-family="'JetBrains Mono', monospace" font-size="11">situational slots tuned to the five enemy threats</text>
  </g>
</svg>
