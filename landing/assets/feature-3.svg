<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Auto-import and in-game overlay: the validated loadout is written into the League client, and a read-only overlay tracks live missions during the game.">
  <defs>
    <radialGradient id="f3bg" cx="50%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#0e1b35"/><stop offset="100%" stop-color="#080f1f"/>
    </radialGradient>
    <linearGradient id="f3beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2fd6c6" stop-opacity="0.1"/><stop offset="100%" stop-color="#2fd6c6"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" rx="20" fill="url(#f3bg)"/>
  <rect x="1" y="1" width="598" height="398" rx="19" fill="none" stroke="#1b2740" stroke-width="2"/>

  <!-- AI node (left) -->
  <g transform="translate(96 150)">
    <circle r="48" fill="#0a1326" stroke="#2fd6c6" stroke-width="2" stroke-opacity="0.55"/>
    <circle r="48" fill="none" stroke="#2fd6c6" stroke-width="2" stroke-dasharray="22 12" opacity="0.8"/>
    <text y="-2" text-anchor="middle" fill="#7ff0e4" font-family="'JetBrains Mono', monospace" font-size="15" letter-spacing="1">AI</text>
    <text y="18" text-anchor="middle" fill="#5fd0ff" font-family="'JetBrains Mono', monospace" font-size="11">loadout</text>
    <text y="78" text-anchor="middle" fill="#7d8ba6" font-family="'JetBrains Mono', monospace" font-size="11">validated</text>
  </g>

  <!-- beam -->
  <g transform="translate(150 150)">
    <line x1="0" y1="0" x2="150" y2="0" stroke="url(#f3beam)" stroke-width="3"/>
    <path d="M142 -7 l9 7 l-9 7" fill="none" stroke="#2fd6c6" stroke-width="2.4"/>
    <g font-family="'JetBrains Mono', monospace" font-size="11" fill="#2fd6c6" text-anchor="middle">
      <text x="75" y="-12">PUT · PATCH</text>
    </g>
  </g>

  <!-- client window (right) -->
  <g transform="translate(316 78)">
    <rect width="248" height="148" rx="14" fill="#0b1426" stroke="#274063" stroke-width="1.6"/>
    <rect width="248" height="30" rx="14" fill="#101d36"/>
    <rect y="16" width="248" height="14" fill="#101d36"/>
    <circle cx="20" cy="15" r="4" fill="#4aa8ff"/><circle cx="36" cy="15" r="4" fill="#2fd6c6"/>
    <text x="60" y="20" fill="#9fb0cc" font-family="'JetBrains Mono', monospace" font-size="11">League client</text>
    <!-- item set rows -->
    <g transform="translate(18 46)">
      <rect width="212" height="36" rx="9" fill="#0e1a32" stroke="#1b2740" stroke-width="1.2"/>
      <rect x="10" y="9" width="18" height="18" rx="4" fill="#2fd6c6" opacity="0.7"/>
      <text x="40" y="23" fill="#cdd6e6" font-family="'Clash Display',sans-serif" font-size="13" font-weight="600">"Sylqon Meta"</text>
      <path d="M180 18 l5 5 l11 -12" fill="none" stroke="#43e0a8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g transform="translate(18 90)">
      <rect width="100" height="30" rx="8" fill="#0e1a32" stroke="#1b2740" stroke-width="1.2"/>
      <text x="50" y="20" text-anchor="middle" fill="#8fa3c4" font-family="'JetBrains Mono', monospace" font-size="11">runes</text>
      <rect x="112" width="100" height="30" rx="8" fill="#0e1a32" stroke="#1b2740" stroke-width="1.2"/>
      <text x="162" y="20" text-anchor="middle" fill="#8fa3c4" font-family="'JetBrains Mono', monospace" font-size="11">spells</text>
    </g>
  </g>

  <!-- in-game overlay mission (bottom) -->
  <g transform="translate(96 268)">
    <rect width="408" height="96" rx="14" fill="#0b1426" stroke="#1b2740" stroke-width="1.5"/>
    <text x="20" y="28" fill="#2fd6c6" font-family="'JetBrains Mono', monospace" font-size="11" letter-spacing="2">IN-GAME&#160;OVERLAY · READ-ONLY</text>
    <!-- mission ring -->
    <g transform="translate(46 64)">
      <circle r="22" fill="none" stroke="#172441" stroke-width="6"/>
      <circle r="22" fill="none" stroke="#2fd6c6" stroke-width="6" stroke-linecap="round" stroke-dasharray="100 138" transform="rotate(-90)"/>
      <text y="5" text-anchor="middle" fill="#7ff0e4" font-family="'JetBrains Mono', monospace" font-size="12">3/4</text>
    </g>
    <text x="84" y="58" fill="#eaf2ff" font-family="'Clash Display',sans-serif" font-size="15" font-weight="600">Don't die for 2 minutes</text>
    <text x="84" y="78" fill="#7d8ba6" font-family="'JetBrains Mono', monospace" font-size="11">role-aware mission · +40 XP mastery</text>
  </g>
</svg>
